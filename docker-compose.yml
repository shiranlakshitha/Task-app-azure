
services:
    frontend:
        build: ./frontend
        container_name: task-app-frontend
        restart: always
    backend:
        build: ./backend
        container_name: task-app-backend
        environment:
            - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/taskapp}
        depends_on:
            - mongo
        
    mongo:
        image: mongo
        container_name: task-app-mongo
        ports:
            - "27017:27017"
    
    nginx:
        image: nginx:latest
        container_name: task-app-nginx
        ports:
            - "80:80"
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - frontend
            - backend
        